name: Zola on GitHub Pages

on: 
 push:
  branches:
   - main

permissions:
  contents: write

jobs:
  build:
    name: Publish site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Zola
        uses: taiki-e/install-action@zola
      - name: Build Zola
        run: zola check --drafts
        env:
          BUILD_ONLY: true
